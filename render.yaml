services:
  - type: web
    name: dispatch-ai-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: PROVIDER_MODE
        value: mock
      - key: DATABASE_URL
        fromDatabase:
          name: dispatch-ai-db
          property: connectionString
      - key: REDIS_URL
        sync: false        # paste your Upstash Redis URL here after deploy
      - key: CORS_ORIGINS
        sync: false        # paste your Vercel URL, e.g. https://frontend-delta-fawn-45.vercel.app
      - key: LOG_LEVEL
        value: info

databases:
  - name: dispatch-ai-db
    plan: free
    databaseName: dispatch
    user: dispatch
