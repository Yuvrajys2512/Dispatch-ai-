# Alembic configuration for Dispatch AI.
# The database URL is NOT set here — env.py reads it from app settings
# (DATABASE_URL), so migrations and the app always agree on the target.

[alembic]
script_location = alembic
prepend_sys_path = .
# Use a date-ordered, slug-friendly revision filename.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s
path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
