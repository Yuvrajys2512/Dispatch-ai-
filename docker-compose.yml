services:
  postgres:
    image: postgres:16-alpine
    container_name: dispatch_postgres
    environment:
      POSTGRES_USER: dispatch
      POSTGRES_PASSWORD: dispatch
      POSTGRES_DB: dispatch
    ports:
      - "5433:5432"
    volumes:
      - dispatch_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dispatch -d dispatch"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: dispatch_redis
    ports:
      - "6380:6379"
    volumes:
      - dispatch_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  dispatch_pgdata:
  dispatch_redisdata:
